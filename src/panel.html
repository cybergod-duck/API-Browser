<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Browse — Side Panel</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="panel-body">
  <div id="app" class="panel-layout">
    <!-- Top Bar -->
    <header class="panel-header">
      <h1>AI Browse</h1>
      <select id="provider-select" class="panel-select">
        <option value="auto">Auto (routed)</option>
      </select>
      <span id="panel-status-dot" class="dot dot-green" title="Active"></span>
    </header>
 
    <!-- Chat Area -->
    <div id="chat-area" class="chat-area">
      <div id="messages" class="messages">
        <div class="msg msg-system">AI Browse ready. Select a model or use Auto routing.</div>
      </div>
    </div>
 
    <!-- Input Area -->
    <div class="input-area">
      <div id="route-indicator" class="route-indicator hidden"></div>
      <div class="input-row">
        <select id="task-type-select" class="task-type-select">
          <option value="browse">Browser</option>
          <option value="reason">Reason</option>
          <option value="code">Code</option>
          <option value="extract">Extract</option>
          <option value="scrap">Scrap</option>
        </select>
        <textarea id="prompt-input" class="prompt-input" rows="3" placeholder="Ask the model... (Enter to send, Shift+Enter for newline)"></textarea>
        <button id="send-btn" class="send-btn" title="Send">➤</button>
      </div>
      <div class="input-footer">
        <span id="model-cost-display"></span>
        <label class="toggle-label xs">
          <input type="checkbox" id="inject-page-cb" checked />
          Include page DOM context
        </label>
      </div>
    </div>
  </div>
  <script src="panel.js" type="module"></script>
</body>
</html>
